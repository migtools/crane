apiVersion: v1
kind: Service
metadata:
  labels:
    app: wordpress
    migrated-with: crane
  name: wordpress-mysql
  namespace: new-migrated-namespace
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - port: 3306
      protocol: TCP
      targetPort: 3306
  selector:
    app: wordpress
    migrated-with: crane
    tier: mysql
  sessionAffinity: None
  type: ClusterIP
