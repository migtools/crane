apiVersion: v1
kind: Service
metadata:
  labels:
    component: apiserver
    migrated-with: crane
    provider: kubernetes
  name: kubernetes
  namespace: new-migrated-namespace
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8443
  selector:
    migrated-with: crane
  sessionAffinity: None
  type: ClusterIP
