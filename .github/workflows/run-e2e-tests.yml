name: Run Crane E2E Tests

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
jobs:
  run-e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup minikube clusters
        uses: ./.github/actions/setup-minikube-clusters
        with:
          cpus: max
          memory: "8192"
          create_users: "true"
          src_user: "dev"
          tgt_user: "dev"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone k8s-apps-deployer
        run: git clone https://github.com/stillalearner/k8s-apps-deployer.git 

      - name: Create venv and install package
        run: |
          cd k8s-apps-deployer
          python3 -m venv venv
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -e .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Ginkgo CLI
        run: |
          GINKGO_VERSION="$(go list -m -f '{{.Version}}' github.com/onsi/ginkgo/v2)"
          go install "github.com/onsi/ginkgo/v2/ginkgo@$GINKGO_VERSION"
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          ginkgo version

      - name: Build crane CLI
        run: go build -o crane .

      - name: Run crane tier0 e2e tests
        run: |
          ginkgo run -v --label-filter="tier0" e2e-tests/tests -- \
            --k8sdeploy-bin="k8sdeploy" \
            --crane-bin="${{ github.workspace }}/crane" \
            --source-context=src \
            --target-context=tgt \
            --source-nonadmin-context=src-dev \
            --target-nonadmin-context=tgt-dev \
            --verbose-logs

      - name: Notify Slack on E2E failure (nightly)
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: ./.github/actions/slack-incoming-webhook
        with:
          text: |
            :warning: Crane E2E · TIER-0 Nightly Tests Failed (scheduled run)
            Failed Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify Slack on E2E failure (push to main)
        if: failure() && github.event_name == 'push'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: ./.github/actions/slack-incoming-webhook
        with:
          text: |
            :warning: Crane E2E · TIER-0 Tests Failed (push to main)
            Commit: ${{ github.sha }}
            Failed Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
