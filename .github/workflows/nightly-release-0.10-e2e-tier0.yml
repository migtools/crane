name: Nightly Test Tier0 (release-0.10)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-e2e:
    uses: ./.github/workflows/reusable-e2e-tier-tests.yml
    with:
      checkout_ref: release-0.10
      label_filter: tier0

  notify-on-nightly-failure:
    needs: run-e2e
    if: ${{ always() && needs.run-e2e.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Slack on E2E failure (nightly release-0.10)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: ./.github/actions/slack-incoming-webhook
        with:
          text: |
            :warning: Crane E2E · TIER-0 Nightly Tests Failed (release-0.10)
            Failed Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
