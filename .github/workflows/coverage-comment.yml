name: Post coverage comment
on:
  workflow_run:
    workflows: ["Go build and unit tests"]
    types: [completed]

jobs:
  comment:
    name: Post coverage on PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Post comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(cat pr-number.txt)
          REPORT=$(cat coverage-report.txt)
          TOTAL=$(grep '^total:' coverage-report.txt | awk '{print $3}')

          BODY=$(cat <<EOF
          ## Test Coverage Report

          **Total: ${TOTAL}**

          <details><summary>Function-level details</summary>

          \`\`\`
          ${REPORT}
          \`\`\`
          </details>

          *Posted by CI*
          EOF
          )
          BODY=$(echo "$BODY" | sed 's/^          //')

          # Update existing comment or create new one
          COMMENT_ID=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("## Test Coverage Report")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
          fi
