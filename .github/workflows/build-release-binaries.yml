name: Build Crane Binaries

on:
  push:
    branches:
      - main
      - release-0.*
    tags:
      - "*"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/reusable-build-release-binaries.yml
    with:
      checkout_ref: ${{ github.ref }}

  release:
    name: Draft release for tag
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: crane-*
          merge-multiple: true
          path: release-assets

      - name: Create combined checksums manifest
        shell: bash
        run: |
          cd release-assets
          : > checksums.txt
          for binary in crane_*; do
            if [ -f "$binary" ] && [[ "$binary" != *.sha256 ]]; then
              sha256sum "$binary" >> checksums.txt
            fi
          done

      - name: Keep only binaries and combined checksums file
        run: rm -f release-assets/*.sha256

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/crane_*
            release-assets/checksums.txt
