name: Test Tier1

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-e2e:
    uses: ./.github/workflows/reusable-e2e-tier-tests.yml
    with:
      checkout_ref: ${{ github.ref_name }}
      label_filter: tier1

  notify-on-nightly-failure:
    needs: run-e2e
    if: ${{ always() && needs.run-e2e.result == 'failure' && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on E2E failure (nightly)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: ./.github/actions/slack-incoming-webhook
        with:
          text: |
            :warning: Crane E2E · TIER-1 Nightly Tests Failed (scheduled run)
            Failed Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify-on-push-failure:
    needs: run-e2e
    if: ${{ always() && needs.run-e2e.result == 'failure' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on E2E failure (push to main)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: ./.github/actions/slack-incoming-webhook
        with:
          text: |
            :warning: Crane E2E · TIER-1 Tests Failed (push to main)
            Commit: ${{ github.sha }}
            Failed Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
