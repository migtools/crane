name: Go build and unit tests
on: [push, pull_request]
jobs:
  build:
    name: Build and unit test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Set up Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: 1.25

      - name: Check out source code
        uses: actions/checkout@v4
        with:
          path: main
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build
        env:
          GOPROXY: "https://proxy.golang.org"
        run: cd main && go build ./...

      # E2E lives under e2e-tests/tests and requires k8sdeploy + clusters; CI runs unit tests only.
      - name: Unit tests with coverage
        env:
          GOPROXY: "https://proxy.golang.org"
        run: |
          cd main
          go test -v -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v '/e2e-tests/tests')
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Per-package coverage</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd main
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}')

          # Build per-package coverage: extract package path, average coverage across functions
          PKG_COVERAGE=$(go tool cover -func=coverage.out | grep -v '^total:' | \
            awk -F'\t+' '{
              # extract package from file path (everything before the last /)
              split($1, parts, "/")
              file = parts[length(parts)]
              sub(file, "", $1)
              sub(/\/$/, "", $1)
              pkg = $1
              pct = $NF + 0
              sum[pkg] += pct
              count[pkg]++
            } END {
              for (pkg in sum) {
                printf "- **%s** — %.1f%%\n", pkg, sum[pkg]/count[pkg]
              }
            }' | sort)

          BODY="## Test Coverage Report

          **Total: ${TOTAL}**

          ### Per-package coverage
          ${PKG_COVERAGE}

          <details><summary>Full function-level details</summary>

          \`\`\`
          $(go tool cover -func=coverage.out)
          \`\`\`
          </details>

          *Posted by CI*"
          BODY=$(echo "$BODY" | sed 's/^          //')

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("## Test Coverage Report")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$BODY"
          fi

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > main/pr-number.txt

      - name: Upload coverage artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            main/coverage.out
            main/pr-number.txt

      - name: Coverage threshold check
        run: |
          cd main
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | sed 's/%//')
          if [ -z "$COVERAGE" ]; then
            echo "::error::Could not parse coverage from coverage.out"
            exit 1
          fi
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=5
          if awk -v cov="$COVERAGE" -v thresh="$THRESHOLD" 'BEGIN {exit !(cov < thresh)}'; then
            echo "::error::Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
