name: Test Minikube User RBAC

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test-user-rbac:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup minikube clusters with test users
        uses: ./.github/actions/setup-minikube-clusters
        with:
          cpus: "2"
          memory: "4096"
          create_users: "true"
          src_user: "sajid"
          tgt_user: "sajid"

      - name: Verify user contexts exist
        run: |
          kubectl config get-contexts src-sajid
          kubectl config get-contexts tgt-sajid

      - name: Check permissions before rolebinding
        run: |
          set +e
          kubectl --context src-sajid auth can-i create deployments -n default --quiet
          SRC_ALLOWED_RC=$?
          kubectl --context tgt-sajid auth can-i create deployments -n default --quiet
          TGT_ALLOWED_RC=$?
          set -e

          SRC_CAN_I="$(kubectl --context src-sajid auth can-i create deployments -n default || true)"
          TGT_CAN_I="$(kubectl --context tgt-sajid auth can-i create deployments -n default || true)"
          echo "src-sajid can create deployments in default (before): ${SRC_CAN_I} (rc=${SRC_ALLOWED_RC})"
          echo "tgt-sajid can create deployments in default (before): ${TGT_CAN_I} (rc=${TGT_ALLOWED_RC})"

          test "$SRC_ALLOWED_RC" -ne 0
          test "$TGT_ALLOWED_RC" -ne 0

      - name: Grant namespace admin on default
        run: |
          kubectl --context src create rolebinding sajid-admin \
            --clusterrole=admin \
            --user=sajid \
            --namespace=default || true

          kubectl --context tgt create rolebinding sajid-admin \
            --clusterrole=admin \
            --user=sajid \
            --namespace=default || true

      - name: Check permissions after rolebinding
        run: |
          set +e
          kubectl --context src-sajid auth can-i create deployments -n default --quiet
          SRC_ALLOWED_RC=$?
          kubectl --context tgt-sajid auth can-i create deployments -n default --quiet
          TGT_ALLOWED_RC=$?
          set -e

          SRC_CAN_I="$(kubectl --context src-sajid auth can-i create deployments -n default || true)"
          TGT_CAN_I="$(kubectl --context tgt-sajid auth can-i create deployments -n default || true)"
          echo "src-sajid can create deployments in default (after): ${SRC_CAN_I} (rc=${SRC_ALLOWED_RC})"
          echo "tgt-sajid can create deployments in default (after): ${TGT_CAN_I} (rc=${TGT_ALLOWED_RC})"

          test "$SRC_ALLOWED_RC" -eq 0
          test "$TGT_ALLOWED_RC" -eq 0
