name: Reusable E2E Tier Tests

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref to checkout before running tests
        required: true
        type: string
      label_filter:
        description: E2E label filter to pass to the test action
        required: true
        type: string

permissions:
  contents: read

jobs:
  run-e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Run crane e2e tests
        uses: ./.github/actions/run-crane-e2e-tier
        with:
          cpus: max
          memory: "8192"
          label_filter: ${{ inputs.label_filter }}
          create_users: "true"
          src_user: "dev"
          tgt_user: "dev"
