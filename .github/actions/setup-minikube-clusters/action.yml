name: setup-minikube-clusters
description: Setup src/tgt Minikube clusters on same Docker network

inputs:
  driver:
    description: Minikube driver
    required: false
    default: docker
  cpus:
    description: Minikube CPU count, or max
    required: false
    default: "2"
  memory:
    description: Minikube memory in MB
    required: false
    default: "4096"
  src_k8s_version:
    description: Kubernetes version for src profile
    required: false
    default: ""
  tgt_k8s_version:
    description: Kubernetes version for tgt profile
    required: false
    default: ""
  ingress_wait:
    description: Ingress rollout timeout
    required: false
    default: "300s"
  enable_olm:
    description: Install OLM on src/tgt clusters
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: latest

    - name: Install minikube
      shell: bash
      run: |
        curl -fsSL -o minikube-linux-amd64 https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        sudo install minikube-linux-amd64 /usr/local/bin/minikube
        minikube version

    - name: Show docker info
      shell: bash
      run: docker version

    - name: Setup src/tgt minikube same network
      shell: bash
      env:
        MINIKUBE_DRIVER: ${{ inputs.driver }}
        MINIKUBE_CPUS: ${{ inputs.cpus }}
        MINIKUBE_MEMORY: ${{ inputs.memory }}
        SRC_K8S_VERSION: ${{ inputs.src_k8s_version }}
        TGT_K8S_VERSION: ${{ inputs.tgt_k8s_version }}
        INGRESS_WAIT: ${{ inputs.ingress_wait }}
        ENABLE_OLM: ${{ inputs.enable_olm }}
      run: make setup-minikube-same-network

    - name: Verify profiles
      shell: bash
      run: |
        minikube profile list
        minikube ip -p src
        minikube ip -p tgt

    - name: Verify src pod can reach tgt API
      shell: bash
      run: |
        TGT_IP="$(minikube ip -p tgt)"
        kubectl config use-context src
        kubectl run test-connectivity \
          --context=src \
          --restart=Never \
          --image=curlimages/curl:8.8.0 \
          --rm -i --quiet -- \
          sh -c "curl -kfsS --connect-timeout 10 --max-time 20 https://${TGT_IP}:8443/version"

