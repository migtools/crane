name: setup-minikube-clusters
description: Setup src/tgt Minikube clusters on same Docker network

inputs:
  driver:
    description: Minikube driver
    required: false
    default: docker
  cpus:
    description: Minikube CPU count, or max
    required: false
    default: "2"
  memory:
    description: Minikube memory in MB
    required: false
    default: "4096"
  src_k8s_version:
    description: Kubernetes version for src profile
    required: false
    default: ""
  tgt_k8s_version:
    description: Kubernetes version for tgt profile
    required: false
    default: ""
  ingress_wait:
    description: Ingress rollout timeout
    required: false
    default: "300s"
  enable_olm:
    description: Install OLM on src/tgt clusters
    required: false
    default: "true"
  create_users:
    description: "Optional: create additional cert-based kubeconfig users for src/tgt clusters (useful for non-admin/RBAC test scenarios)."
    required: false
    default: "false"
  src_user:
    description: "Username for the additional src-cluster user created when create_users=true."
    required: false
    default: "dev"
  tgt_user:
    description: "Username for the additional tgt-cluster user created when create_users=true."
    required: false
    default: "dev"
  src_user_context:
    description: "Optional kubeconfig context name for src user. If empty, defaults to <src-profile>-<src-user>."
    required: false
    default: ""
  tgt_user_context:
    description: "Optional kubeconfig context name for tgt user. If empty, defaults to <tgt-profile>-<tgt-user>."
    required: false
    default: ""
  user_org:
    description: "Organization (certificate subject O) to include in generated user certificates."
    required: false
    default: "developers"
  user_cert_days:
    description: "Validity period (days) for generated user certificates."
    required: false
    default: "365"

runs:
  using: composite
  steps:
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: latest

    - name: Install minikube
      shell: bash
      run: |
        curl -fsSL -o minikube-linux-amd64 https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        sudo install minikube-linux-amd64 /usr/local/bin/minikube
        minikube version

    - name: Show docker info
      shell: bash
      run: docker version

    - name: Setup src/tgt minikube same network
      shell: bash
      env:
        MINIKUBE_DRIVER: ${{ inputs.driver }}
        MINIKUBE_CPUS: ${{ inputs.cpus }}
        MINIKUBE_MEMORY: ${{ inputs.memory }}
        SRC_K8S_VERSION: ${{ inputs.src_k8s_version }}
        TGT_K8S_VERSION: ${{ inputs.tgt_k8s_version }}
        INGRESS_WAIT: ${{ inputs.ingress_wait }}
        ENABLE_OLM: ${{ inputs.enable_olm }}
        CREATE_USERS: ${{ inputs.create_users }}
        SRC_USER: ${{ inputs.src_user }}
        TGT_USER: ${{ inputs.tgt_user }}
        SRC_USER_CONTEXT: ${{ inputs.src_user_context }}
        TGT_USER_CONTEXT: ${{ inputs.tgt_user_context }}
        USER_ORG: ${{ inputs.user_org }}
        USER_CERT_DAYS: ${{ inputs.user_cert_days }}
      run: make setup-minikube-same-network

    - name: Verify profiles
      shell: bash
      run: |
        minikube profile list
        minikube ip -p src
        minikube ip -p tgt

    - name: Verify src pod can reach tgt API
      shell: bash
      run: |
        TGT_IP="$(minikube ip -p tgt)"
        kubectl config use-context src
        kubectl run test-connectivity \
          --context=src \
          --restart=Never \
          --image=curlimages/curl:8.8.0 \
          --rm -i --quiet -- \
          sh -c "curl -kfsS --connect-timeout 10 --max-time 20 https://${TGT_IP}:8443/version"

