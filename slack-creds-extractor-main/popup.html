<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1d1c1d;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4a154b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #611f69;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      display: none;
      font-size: 12px;
      line-height: 1.4;
    }
    #status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }
    #status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
    }
    #status.info {
      display: block;
      background: #e3f2fd;
      color: #1565c0;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <h3>Slack Token Extractor</h3>
  <button id="extract">Extract & Save Tokens</button>
  <div id="status"></div>
  <div class="hint">
    Tokens are saved to ~/.config/slack/<br>
    Make sure you have a Slack tab open.
  </div>
  <script src="popup.js"></script>
</body>
</html>
