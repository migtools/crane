apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment-2
  namespace: test-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
      - name: nginx
        image: nginx:1.19
        ports:
        - containerPort: 80
