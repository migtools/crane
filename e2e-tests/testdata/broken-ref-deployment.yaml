apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-ref-deploy
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-ref-deploy
  template:
    metadata:
      labels:
        app: broken-ref-deploy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          envFrom:
            - configMapRef:
                name: missing-configmap
