apiVersion: v1
kind: Service
metadata:
  labels:
    name: redis
  name: redis
  namespace: redis
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - name: redis
      port: 6379
      protocol: TCP
      targetPort: 6379
  selector:
    name: redis
  sessionAffinity: None
  type: ClusterIP
